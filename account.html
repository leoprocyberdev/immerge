<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Ishaka Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/footer.css">
    <style>
    body {
      margin: 0px;
      padding: 0px;
    }

    </style>
</head>
<body>
    <header style="background:#075211; color:white; padding:15px; text-align:center;">
        <h2 style="margin:0px; color: gold;">Account</h2>
    </header>

<main style="padding-bottom: 80px; background: #f9f9f9; min-height: 90vh;">
    
    <div style="background: white; padding: 20px; border-bottom: 1px solid #eee;">
        <h3 style="margin: 0; color: #333;">Welcome, <span id="welcome-username">Guest</span></h3>
        <div id="biz-link-container" style="margin-top: 5px; font-size: 13px;">
            <span style="color: #888;">Checking business status...</span>
        </div>
    </div>

    <div style="display: flex; background: white; margin: 15px 0; padding: 15px; border-top: 1px solid #eee; border-bottom: 1px solid #eee;">
        <div style="flex: 1; text-align: center; border-right: 1px solid #eee;">
            <p style="margin: 0; font-size: 12px; color: #777;">Akatare Balance</p>
            <p style="margin: 5px 0 0; font-weight: bold; color: #075211;">UGX 0</p>
        </div>
        <div style="flex: 1; text-align: center;">
            <p style="margin: 0; font-size: 12px; color: #777;">Vouchers</p>
            <p style="margin: 5px 0 0; font-weight: bold; color: #075211;">0 Available</p>
        </div>
    </div>

    <div class="account-menu" style="background: white; border-top: 1px solid #eee;">
        <div class="menu-item" onclick="location.href='orders.html'">📦 Orders</div>
        <div class="menu-item" onclick="location.href='inbox.html'">💬 Inbox</div>
        <div class="menu-item" onclick="location.href='wishlist.html'">❤️ Wishlist</div>
        <div class="menu-item" onclick="location.href='reviews.html'">⭐ Ratings & Reviews</div>
        <div class="menu-item" onclick="location.href='followed.html'">🏢 Followed Businesses</div>
        
        <div style="height: 15px; background: #f9f9f9;"></div> <div class="menu-item" onclick="location.href='help.html'">🎧 Help and Support</div>
        <div class="menu-item" onclick="location.href='settings.html'">⚙️ Settings</div>
        <div class="menu-item" id="logout-btn" style="color: #ff4444; border-bottom: none;">🚪 Logout</div>
    </div>

</main>

<style>
    .menu-item {
        padding: 18px 20px;
        border-bottom: 1px solid #eee;
        font-size: 15px;
        color: #444;
        cursor: pointer;
        display: flex;
        align-items: center;
    }
    .menu-item:active {
        background-color: #f0f0f0;
    }
</style>


    <!-- The footer starts from here -->
    <section class="foot-nav">
      <div id="navigate">
        <section class="img">
          <img src="images/home.svg">
        </section>
        <h5>Home</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/categories.svg">
        </section>
        <h5>Categories</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/cart.svg">
        </section>
        <h5>Cart</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/wishlist.svg">
          <span id="cart-count">0</span></span>
        </section>
        <h5>Wishlist</h5>
      </div>
      <div id="navigate">
       <section class="img">
          <img src="images/account.svg">
        </section>
        <h5>Account</h5>
      </div>
    </section>
    <script type="module" src="account.js"></script>
    <script src="foot-nav.js"></script>
</body>
</html>
