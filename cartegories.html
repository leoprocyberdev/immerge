<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Ishaka Market</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/footer.css">
    <style>
    body {
      margin: 0px;
      padding: 0px;
    }

    </style>
</head>
<body>
    <header style="background:#075211; color:white; padding:15px; text-align:center;">
        <h2 style="margin:0px; color: gold;">Cartegories</h2>
    </header>


    <!-- The footer starts from here -->
    <section class="foot-nav">
      <div id="navigate">
        <section class="img">
          <img src="images/home.svg">
        </section>
        <h5>Home</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/categories.svg">
        </section>
        <h5>Categories</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/cart.svg">
        </section>
        <h5>Cart</h5>
      </div>
      <div id="navigate">
        <section class="img">
          <img src="images/wishlist.svg">
          <span id="cart-count">0</span></span>
        </section>
        <h5>Wishlist</h5>
      </div>
      <div id="navigate">
       <section class="img">
          <img src="images/account.svg">
        </section>
        <h5>Account</h5>
      </div>
    </section>

    <script src="foot-nav.js"></script>
</body>
</html>
