<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akatare Chat</title>
    
    <style>
    * { box-sizing: border-box; }
    
    body { 
        margin: 0; 
        background: #0b141a; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        height: 100vh; 
        height: 100dvh; 
        width: 100vw;
        overflow: hidden; 
        position: fixed; 
    }

    header { 
        background: #075211; 
        padding: 10px 15px; 
        display: flex; 
        align-items: center; 
        color: white; 
        height: 60px; 
        flex-shrink: 0;
    }

    .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; color: white; text-decoration: none; }

    #message-area { 
        flex: 1;
        overflow-y: auto; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 10px; 
        background-color: #0b141a;
        /* Replace with your actual path if you have a pattern */
        background-image: url('images/chat-bg.png'); 
    }

    .chat-footer { 
        background: #202c33; 
        padding: 10px 12px; 
        padding-bottom: env(safe-area-inset-bottom, 10px); 
        display: grid; 
        grid-template-columns: 40px 1fr 50px; 
        align-items: center; 
        gap: 8px; 
        width: 100%;
        min-height: 70px; 
        flex-shrink: 0; 
        border-top: 1px solid #2a3942;
    }

    .input-wrapper { 
        background: #2a3942; 
        border-radius: 25px; 
        display: flex; 
        align-items: center; 
        padding: 0 15px;
        min-height: 45px;
        min-width: 0; 
    }

    .input-wrapper input { 
        flex: 1;
        background: transparent; 
        border: none; 
        color: white; 
        outline: none; 
        font-size: 16px; 
        padding: 10px 0;
    }

    .action-circle { 
        background: #075211; 
        border: none; 
        border-radius: 50%; 
        width: 45px; 
        height: 45px; 
        color: white; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer;
        flex-shrink: 0;
    }

    .icon-btn { background: none; border: none; color: #8696a0; font-size: 24px; padding: 0; display: flex; align-items: center; cursor: pointer; }
    
    .hidden { display: none !important; }
    
    /* Bubbles */
    .bubble { max-width: 85%; padding: 8px 12px; border-radius: 10px; font-size: 14px; color: white; position: relative; word-wrap: break-word; }
    .sent { align-self: flex-end; background: #005c4b; border-top-right-radius: 0; }
    .received { align-self: flex-start; background: #202c33; border-top-left-radius: 0; }
    .msg-time { font-size: 10px; color: #8696a0; display: block; text-align: right; margin-top: 4px; }
    
    /* Visualizer & Timer */
    #visualizer { margin-right: 10px; background: transparent; }
    #recording-timer { color: #ff3b30; font-size: 14px; font-weight: bold; margin-right: 10px; }
    .recording-ui #msg-input { display: none; }

    /* Custom Audio Player Styles */
    .custom-audio-player {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #111b21;
        padding: 8px 12px;
        border-radius: 12px;
        min-width: 200px;
        margin-top: 5px;
    }
    .play-btn {
        background: #00a884;
        border: none;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
    }
    .audio-progress { flex: 1; height: 4px; background: #333; border-radius: 2px; position: relative; }
    .progress-fill { height: 100%; background: #00a884; width: 0%; border-radius: 2px; }
    
    .read-only-banner {
    grid-column: 1 / -1; /* This makes it span across all 3 grid columns */
    background: #111b21;
    color: #8696a0;
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid #222e35;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}


    .recording-pulse { animation: pulse 1.5s infinite; background: #ff3b30 !important; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
</style>
</head>
<body>

    <header>
        <span class="back-btn" onclick="history.back()">←</span>
        <div class="header-info">
            <div class="header-name" id="chat-title">Name</div>
            <div style="font-size: 11px; opacity: 0.8;">online</div>
        </div>
    </header>

    <div id="message-area"></div>

    <div class="chat-footer">
        <input type="file" id="image-input" accept="image/*" style="display: none;">
        <button class="icon-btn" onclick="document.getElementById('image-input').click()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
        </button>
        
        <div class="input-wrapper">
            <span id="recording-timer" class="hidden">0:00</span>
            <canvas id="visualizer" width="100" height="30" class="hidden"></canvas>
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
        </div>

        <div id="action-btns">
            <button id="record-btn" class="action-circle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
            </button>

            <button id="send-btn" class="action-circle hidden">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <script type="module" src="chat-view.js"></script>
</body>
</html>
