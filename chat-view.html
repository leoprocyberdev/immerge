<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Akatare Chat</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .msg-time {
    font-size: 10px;
    color: #8696a0;
}

/* Ensure ticks don't wrap to a new line awkwardly */
.sent .msg-time {
    display: flex;
    align-items: center;
}

        body { margin: 0; background: #0b141a; font-family: Arial, sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Fixed WhatsApp Header */
        header { background: #075211; padding: 10px 15px; display: flex; align-items: center; color: white; position: sticky; top: 0; z-index: 100; }
        .back-btn { font-size: 24px; margin-right: 15px; cursor: pointer; }
        .header-info { flex: 1; }
        .header-name { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }

        /* Message Area */
        #message-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('images/chat-bg.png'); /* Optional pattern */ }
        
        /* Bubbles */
        .bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 14px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: #005c4b; color: white; border-top-right-radius: 0; }
        .received { align-self: flex-start; background: #202c33; color: white; border-top-left-radius: 0; }
        .msg-time { font-size: 10px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }

        /* Footer / Input */
        .chat-footer { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        .chat-footer input { flex: 1; background: #2a3942; border: none; color: white; padding: 10px 15px; border-radius: 20px; outline: none; }
        .send-btn { background: #075211; border: none; border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .read-only-banner { width: 100%; text-align: center; color: #8696a0; font-size: 13px; padding: 10px; background: #182229; }
    </style>
</head>
<body>
    <header>
        <span class="back-btn" onclick="history.back()">←</span>
        <div class="header-info">
            <div class="header-name" id="chat-title">Name</div>
            <div style="font-size: 11px; opacity: 0.8;">online</div>
        </div>
    </header>

    <div id="message-area">
        </div>

    <div id="input-container">
    <div class="chat-footer">
        <input type="file" id="image-input" accept="image/*" style="display: none;">
        <span onclick="document.getElementById('image-input').click()">📎</span>
        
        <input type="text" id="msg-input" placeholder="Type a message...">
        <button class="send-btn" id="send-btn">➤</button>
    </div>
</div>


    <script type="module" src="chat-view.js"></script>
</body>
</html>
