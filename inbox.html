<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akatare Inbox</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* WhatsApp Dark Theme Base */
        body { margin: 0; background: #111b21; color: white; font-family: Arial, sans-serif; overflow-x: hidden; }
        
        /* Brand Header */
        header { background: #075211; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .header-icons { display: flex; gap: 20px; font-size: 18px; cursor: pointer; }
        
        /* Search Bar */
        .search-container { padding: 10px; background: #111b21; }
        .search-bar { background: #202c33; padding: 10px 15px; border-radius: 20px; color: #8696a0; font-size: 14px; display: flex; align-items: center; gap: 10px; }

        /* Chat List Styling */
        .chat-list { list-style: none; padding: 0; margin: 0; }
        .chat-item { display: flex; padding: 12px 15px; align-items: center; border-bottom: 0.5px solid #222d34; cursor: pointer; transition: background 0.2s; }
        .chat-item:active { background: #202c33; }
        
        /* Avatar Logic */
        .avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: #607d8b; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Text Content */
        .chat-info { flex: 1; min-width: 0; }
        .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .name { font-weight: bold; font-size: 16px; color: #e9edef; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .time { font-size: 12px; color: #8696a0; }
        .last-msg { font-size: 14px; color: #8696a0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        /* Official Channel Branding */
        .official-chat { background: #0b141a; border-left: 4px solid gold; }
        .verified-badge { margin-left: 5px; vertical-align: middle; }

        /* Loading Spinner */
        .loader { text-align: center; padding: 20px; color: #8696a0; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <h2 style="color: gold; margin: 0; font-size: 22px;">Akatare Inbox</h2>
        <div class="header-icons">
            <span>📷</span>
            <span>🔍</span>
            <span>⋮</span>
        </div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span>🔍</span> Ask Akatare AI or Search
        </div>
    </div>

    <div class="chat-list">
        <div class="chat-item official-chat" onclick="openChat('akatare_official_system', 'Akatare Support', true)">
            <div class="avatar" style="background: #075211; border: 1px solid gold;">
                <img src="images/logo.png" onerror="this.src='https://ui-avatars.com/api/?name=A+K&background=075211&color=fff'">
            </div>
            <div class="chat-info">
                <div class="chat-top">
                    <span class="name">Akatare Official 
                        <svg class="verified-badge" width="16" height="16" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10" fill="gold"/>
                            <path d="M8 12.5L10.5 15L16 9" stroke="#075211" stroke-width="2.5" stroke-linecap="round"/>
                        </svg>
                    </span>
                    <span class="time" style="color: gold;">Active</span>
                </div>
                <span class="last-msg">Security updates and support notifications</span>
            </div>
        </div>

        <div id="dynamic-business-list">
            <div class="loader">Fetching your business chats...</div>
        </div>
    </div>

    <script type="module" src="inbox.js"></script>
</body>
</html>
